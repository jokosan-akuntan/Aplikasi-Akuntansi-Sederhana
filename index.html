<!DOCTYPE html>
<html>
<head>
    <title>Aplikasi Keuangan Sederhana</title>
</head>
<body>

    <h1>Sistem Keuangan</h1>

    <button onclick="loadData()">Ambil Data</button>

    <div id="hasil"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxniPB7XJOenXHbzXW6uodQuxNBXGKe542FKShYfoACzfN3i1MOUFbIalXuqiNk6Hlw6Q/exec";

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                document.getElementById("hasil").innerHTML =
                    JSON.stringify(data);
            } catch (err) {
                console.error(err);
            }
        }
    </script>

</body>
</html>
